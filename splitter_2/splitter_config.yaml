# ESC/POS Printer Splitter Configuration

# พอร์ตที่โปรแกรมจะรอรับข้อมูลจากโปรแกรมขายหน้าเครื่อง (POS)
# โดยปกติเครื่องพิมพ์ ESC/POS จะใช้พอร์ต 9100
listen_port: 9100

# รายชื่อเครื่องพิมพ์ที่ต้องการให้ส่งต่อข้อมูลไปให้ (Forward)
# สามารถเพิ่มได้ตั้งแต่ 1 เครื่องเป็นต้นไป
printers:
  - ip: "192.168.1.11"
    port: 9100
    name: "Printer 1 (Kitchen)"
  - ip: "192.168.1.12"
    port: 9100
    name: "Printer 2 (Bar)"
  - ip: "192.168.1.13"
    port: 9100
    name: "Printer 3 (Checker)"
  # สามารถเพิ่มต่อได้ด้านล่างนี้
  # - ip: "192.168.1.14"
  #   port: 9100
  #   name: "Printer 4"
